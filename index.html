  <script>
    // ❗ НІЯКИХ localhost у проді
    window.SHIFTTIME_API_BASE = '';

    // Маршрутизація старих шляхів на Netlify Functions
    window.__apiMap = {
      '/api/telegram/send'    : '/.netlify/functions/send-telegram',
      '/api/orders/set-status': '/.netlify/functions/set-status',
      '/api/orders/set-ttn'   : '/.netlify/functions/set-ttn',
      '/api/config/kv'        : '/.netlify/functions/config-links',
      '/api/np/track'         : '/.netlify/functions/np-track',
    };

    // Перехоплення fetch → підміна шляхів на функції
    (function () {
      const origFetch = window.fetch.bind(window);
      window.fetch = (input, init) => {
        try {
          const urlStr = (typeof input === 'string') ? input : input.url;
          const u = new URL(urlStr, location.origin);
          const mapped = window.__apiMap[u.pathname];
          if (mapped) {
            const newUrl = mapped + u.search;
            input = (typeof input === 'string') ? newUrl : new Request(newUrl, input);
          }
        } catch (_) {}
        return origFetch(input, init);
      };
    })();
  </script>
