<!-- Шапка -->
<header class="w-full flex justify-between items-center bg-[#1a1a1a] text-white px-4 py-1 border-b border-white/20">
  <!-- Лого -->
  <div class="flex items-center gap-2">
    <img src="assets/img/logo-shifttime-crm.jpg" alt="ShiftTime CRM" class="h-14 w-auto">
    <span class="sr-only">ShiftTime CRM</span>
  </div>

  <div class="flex gap-4 items-center">
    <!-- Версія -->
    <span id="app-version" class="text-sm bg-white/10 border border-white/20 px-2 py-1 rounded">
      V-1.0.6
    </span>

    <!-- Меню користувача -->
    <div id="user-menu" class="relative">
      <!-- Бейдж (тут JS підставляє “Адмін — Ім’я”; показ/приховування робить initAuth) -->
      <button
        id="global-user-badge"
        class="hidden text-sm px-3 py-1 rounded bg-white/10 hover:bg-white/20 border border-white/25"
        type="button"
        aria-haspopup="menu"
        aria-expanded="false">
      </button>

      <!-- Дропдаун -->
      <div
        id="global-user-dropdown"
        class="hidden absolute right-0 mt-2 w-40 bg-white text-black rounded shadow-lg border border-slate-200 z-[10050]">
        <button id="global-logout-btn" class="block w-full text-left px-3 py-2 hover:bg-slate-100">Вихід</button>
      </div>
    </div>

    <!-- Кнопка входу у глобальній шапці (видима коли користувач не авторизований) -->
    <button id="global-login-btn" class="px-3 py-1 rounded bg-white text-black text-sm">Увійти</button>

    <!-- Менеджер -->
    <select id="manager" name="manager" class="rounded bg-white text-black px-2 py-1">
      <option value="Іван">Іван</option>
      <option value="Богдан">Богдан</option>
    </select>
  </div>
</header>

<div class="flex"></div>
