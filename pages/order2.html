   <!-- Скрипти віджетів (підключаємо після того як HTML вже буде вставлено) -->
  <script type="module">
    import { initNovaPoshta } from '../widgets/nova-poshta/js/main_adres.js';

    async function loadComponent(id, path) {
      try {
        const res = await fetch(path);
        const html = await res.text();
        const el = document.getElementById(id);
        if (el) {
          el.innerHTML = html;
          console.log(`📥 Компонент вставлено у #${id}: ${path}`);

          // 🧠 Чекаємо DOM-рендер
          await new Promise((resolve) => requestAnimationFrame(resolve));
          console.log(`✅ DOM оновлено після вставки ${id}`);
        } else {
          console.warn(`⚠️ Не знайдено контейнер з ID: #${id}`);
        }
      } catch (err) {
        console.error(`❌ Помилка при завантаженні ${path}`, err);
      }
    }

    async function loadAllComponents() {
      await loadComponent("form-customer-block", "../widgets/nova-poshta/components/forms/form-address.html");
      await loadComponent("form-address-block", "../widgets/nova-poshta/components/forms/form-customer.html");

      console.log("✅ Компоненти завантажено — перевіряємо чекбокси...");

      // 🔧 Ініціалізація Nova Poshta
      await initNovaPoshta();

      // 👇 Логіка чекбоксів
      setTimeout(() => {
        const otherToggle = document.getElementById("otherRecipientToggle");
        const otherBlock = document.getElementById("otherFields");
        const emailToggle = document.getElementById("emailToggle");
        const emailField = document.getElementById("emailField");

        if (!otherToggle || !otherBlock) {
          console.warn("❗ Не знайдено поля для іншого одержувача");
        } else {
          console.log("🔘 Знайдено поле 'Інший Одержувач'");
          otherToggle.addEventListener("change", () => {
            otherBlock.classList.toggle("hidden", !otherToggle.checked);
            console.log(`▶️ toggle otherFields: ${otherToggle.checked}`);
          });
          otherBlock.classList.toggle("hidden", !otherToggle.checked);
        }

        if (!emailToggle || !emailField) {
          console.warn("❗ Не знайдено поля для email");
        } else {
          console.log("🔘 Знайдено поле 'Email'");
          emailToggle.addEventListener("change", () => {
            emailField.classList.toggle("hidden", !emailToggle.checked);
            console.log(`▶️ toggle emailField: ${emailToggle.checked}`);
          });
          emailField.classList.toggle("hidden", !emailToggle.checked);
        }
      }, 100);
    }

    document.addEventListener("DOMContentLoaded", () => {
      console.log("📥 DOMContentLoaded");
      loadAllComponents();
    });
  </script>
