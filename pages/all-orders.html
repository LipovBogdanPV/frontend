<section id="ordersWidget" class="space-y-4 w-full">
  <div class="flex flex-wrap items-center gap-2 rounded-2xl border border-zinc-800 bg-zinc-900/60 p-3">
    <h2 class="text-lg font-semibold">Усі замовлення</h2>
    <div class="ml-auto flex flex-wrap items-center gap-2">
      <input id="searchBox" type="text" placeholder="Пошук…"
             class="h-9 w-56 rounded-lg border border-zinc-800 bg-zinc-950/60 px-3 text-sm outline-none">
      <select id="statusFilter" multiple size="7">
        <option value="Виготовляється">Виготовляється</option>
        <option value="Комплектується">Комплектується</option>
        <option value="Відправлено">Відправлено</option>
        <option value="В дорозі">В дорозі</option>
        <option value="Прибуло до відділення">Прибуло до відділення</option>
        <option value="Отримано">Отримано</option>
        <option value="__EMPTY__">(Без статусу)</option>
      </select>
    </div>
    <div id="ao-toolbar" class="flex items-center gap-2"></div>
  </div>

  <!-- ЄДИНИЙ контейнер: шапка + тіло зі скролом -->
  <div id="ordersBox" class="rounded-2xl border border-zinc-800 bg-zinc-900/40 w-full
                            flex flex-col min-h-0">
    <div id="ordersHead"
         class="px-4 py-2 text-[11px] uppercase tracking-wide text-zinc-500 sticky top-0 z-10
                bg-zinc-900/80 backdrop-blur">
    </div>
    <div id="ordersBody" class="flex-1 min-h-0 overflow-auto"></div>
  </div>
</section>

<div id="send-modal-root"></div>
